<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Analyzer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- Фоновый canvas для частиц -->
    <canvas id="particles-canvas"></canvas>

    <!-- Размытые цветные пятна -->
    <div class="bg-blobs" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Экран анализа -->
    <section id="app-screen" class="screen active">
        <header class="app-header">
            <div class="header-brand">
                <svg viewBox="0 0 24 24" width="26" height="26" fill="var(--accent)" aria-hidden="true">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"></path>
                </svg>
                <span class="header-title">Profile Analyzer</span>
            </div>
            <a href="/auth/logout" class="logout-btn" aria-label="Выйти из аккаунта">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Выйти
            </a>
        </header>

        <main class="app-main">
            <!-- Поиск -->
            <div class="search-section">
                <h2 class="search-title">Анализ GitHub профиля</h2>
                <p class="search-subtitle">Введите имя пользователя для получения детальной информации</p>
                <div class="search-box">
                    <div class="search-input-wrapper">
                        <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="var(--fg-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="username" placeholder="Например: octocat" aria-label="Имя пользователя GitHub" autocomplete="off" spellcheck="false">
                    </div>
                    <button class="search-btn" id="search-btn" aria-label="Начать поиск">
                        <span>Поиск</span>
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Лоадер -->
            <div id="loader" class="loader hidden" aria-label="Загрузка">
                <div class="loader-dot"></div>
                <div class="loader-dot"></div>
                <div class="loader-dot"></div>
            </div>

            <!-- Результаты — сюда JS вставит клон шаблона -->
            <div id="result" class="result-section"></div>

            <!-- История -->
            <div class="history-section">
                <h3 class="history-title">Последние запросы</h3>
                <div class="history-tags" id="history-list"></div>
            </div>
        </main>
    </section>

    <!-- ============================================================
         Шаблоны для динамического рендера результатов.
         Элементы <template> не отображаются на странице —
         JS клонирует их содержимое и заполняет данными.
         ============================================================ -->

    <!-- Строка одного языка (используется в tmpl-analysis) -->
    <template id="tmpl-lang-row">
        <div class="lang-row">
            <span class="lang-name">
                <span class="lang-dot"></span>
                <span class="lang-name-text"></span>
            </span>
            <div class="lang-bar-track">
                <div class="lang-bar-fill"></div>
            </div>
            <span class="lang-pct"></span>
        </div>
    </template>

    <!-- Бейдж с текстовой иконкой (звёзды, форки, дата…) -->
    <template id="tmpl-badge-icon">
        <div class="meta-badge">
            <span class="meta-icon"></span>
            <span class="meta-badge-text"></span>
        </div>
    </template>

    <!-- Бейдж с цветной точкой языка -->
    <template id="tmpl-badge-lang">
        <div class="meta-badge">
            <span class="lang-dot-sm"></span>
            <span class="meta-badge-text"></span>
        </div>
    </template>

    <!-- Основная карточка анализа: языки, резюме, статистика -->
    <template id="tmpl-analysis">
        <div class="analysis-card animate-in">
            <div class="analysis-border-glow"></div>

            <div class="analysis-header">
                <div class="analysis-avatar-wrap">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="var(--accent)" aria-hidden="true">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                </div>
                <div>
                    <div class="analysis-username" data-field="username"></div>
                    <div class="analysis-label">Анализ профиля GitHub</div>
                </div>
            </div>

            <div class="analysis-stats">
                <div class="a-stat">
                    <span class="a-stat-value" data-field="repos">0</span>
                    <span class="a-stat-label">Репозитории</span>
                </div>
                <div class="a-stat a-stat--accent">
                    <span class="a-stat-value" data-field="stars">0</span>
                    <span class="a-stat-label">Звёзды</span>
                </div>
                <div class="a-stat">
                    <span class="a-stat-value" data-field="followers">0</span>
                    <span class="a-stat-label">Подписчики</span>
                </div>
                <div class="a-stat">
                    <span class="a-stat-value" data-field="activity">0</span>
                    <span class="a-stat-label">Активность/год</span>
                </div>
            </div>

            <!-- Секция языков — скрыта по умолчанию, JS покажет при наличии данных -->
            <div class="analysis-section" data-section="languages" style="display:none">
                <h3 class="section-title">Языки программирования</h3>
                <div class="lang-bars" data-container="lang-bars"></div>
            </div>

            <!-- Секция резюме — скрыта по умолчанию -->
            <div class="analysis-section" data-section="resume" style="display:none">
                <h3 class="section-title">Резюме</h3>
                <div class="resume-text" data-field="resume"></div>
            </div>

            <!-- Мета-бейджи — скрыты по умолчанию -->
            <div class="analysis-meta" data-container="badges" style="display:none"></div>

            <details class="raw-json">
                <summary>Сырые данные JSON</summary>
                <pre data-field="raw-json"></pre>
            </details>
        </div>
    </template>

    <!-- Карточка профиля с аватаром (сырой GitHub API) -->
    <template id="tmpl-profile">
        <div class="profile-card animate-in">
            <div class="profile-border-glow"></div>

            <div class="profile-header">
                <img class="profile-avatar" data-field="avatar" src="" alt="">
                <div class="profile-info">
                    <h2 class="profile-name" data-field="name"></h2>
                    <a class="profile-login" data-field="login-link" href="#" target="_blank" rel="noopener"></a>
                    <p class="profile-bio" data-field="bio" style="display:none"></p>
                </div>
            </div>

            <div class="profile-stats">
                <div class="stat">
                    <span class="stat-value" data-field="repos">0</span>
                    <span class="stat-label">Репозитории</span>
                </div>
                <div class="stat">
                    <span class="stat-value" data-field="followers">0</span>
                    <span class="stat-label">Подписчики</span>
                </div>
                <div class="stat">
                    <span class="stat-value" data-field="following">0</span>
                    <span class="stat-label">Подписки</span>
                </div>
                <div class="stat">
                    <span class="stat-value" data-field="gists">0</span>
                    <span class="stat-label">Gists</span>
                </div>
            </div>

            <div class="profile-details">
                <div class="detail" data-detail="location" style="display:none">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    <span data-field="location-text"></span>
                </div>
                <div class="detail" data-detail="company" style="display:none">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>
                    <span data-field="company-text"></span>
                </div>
                <div class="detail" data-detail="email" style="display:none">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <a data-field="email-link" href="mailto:"></a>
                </div>
                <div class="detail" data-detail="blog" style="display:none">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    <a data-field="blog-link" href="#" target="_blank" rel="noopener"></a>
                </div>
                <div class="detail" data-detail="created" style="display:none">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <span data-field="created-text"></span>
                </div>
            </div>

            <details class="raw-json">
                <summary>Сырые данные JSON</summary>
                <pre data-field="raw-json"></pre>
            </details>
        </div>
    </template>

    <!-- Упрощённая карточка (без аватара, с бейджами языков) -->
    <template id="tmpl-simple">
        <div class="analysis-card animate-in">
            <div class="analysis-border-glow"></div>

            <div class="analysis-header">
                <div class="analysis-avatar-wrap">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="var(--accent)" aria-hidden="true">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                </div>
                <div>
                    <div class="analysis-username" data-field="username"></div>
                    <div class="analysis-label">Анализ профиля GitHub</div>
                </div>
            </div>

            <div class="analysis-stats">
                <div class="a-stat">
                    <span class="a-stat-value" data-field="repos">0</span>
                    <span class="a-stat-label">Репозитории</span>
                </div>
                <div class="a-stat a-stat--accent">
                    <span class="a-stat-value" data-field="stars">0</span>
                    <span class="a-stat-label">Звёзды</span>
                </div>
                <div class="a-stat">
                    <span class="a-stat-value" data-field="followers">0</span>
                    <span class="a-stat-label">Подписчики</span>
                </div>
            </div>

            <div class="analysis-section" data-section="top-langs" style="display:none">
                <h3 class="section-title">Основные языки</h3>
                <div class="analysis-meta" data-container="top-langs"></div>
            </div>

            <div class="analysis-section" data-section="resume" style="display:none">
                <h3 class="section-title">Резюме</h3>
                <div class="resume-text" data-field="resume"></div>
            </div>

            <details class="raw-json">
                <summary>Сырые данные JSON</summary>
                <pre data-field="raw-json"></pre>
            </details>
        </div>
    </template>

    <!-- Fallback — просто JSON -->
    <template id="tmpl-json">
        <div class="json-card animate-in">
            <pre data-field="json-content"></pre>
        </div>
    </template>

    <!-- Ошибка -->
    <template id="tmpl-error">
        <div class="error-card animate-in">
            <span data-field="error-text"></span>
        </div>
    </template>

    <script src="/static/js/app.js"></script>
</body>
</html>
